<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>บันทึกข้อมูลพนักงาน</title>

  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#f3ecec;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .card{
      width: 380px;
      background:#fff;
      border-radius:10px;
      padding:22px 22px 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,.12);
    }

    h2{
      margin:0 0 18px;
      text-align:center;
      font-size:18px;
      font-weight:700;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-size:13px;
      font-weight:600;
    }

    input, select{
      width:100%;
      box-sizing:border-box;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:6px;
      outline:none;
      font-size:13px;
      background:#fff;
    }

    input:focus, select:focus{
      border-color:#d837dd;
      box-shadow: 0 0 0 3px rgba(60, 190, 241, 0.18);
    }

    .btn{
      width:100%;
      margin-top:16px;
      padding:11px 12px;
      border:none;
      border-radius:6px;
      background:#5c25b6;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }

    .btn:hover{
      background:#43e3ff;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>บันทึกข้อมูลพนักงาน</h2>

 <form method="post" id="employeeForm">
  

  <label>Full Name</label>
  <input type="text" name="fullname" required />

  <label>Email</label>
  <input type="email" name="email" required />

  <label>Position</label>
  <select name="position">
    <option>Manager</option>
    <option>Staff</option>
    <option>Supervisor</option>
    <option>Intern</option>
  </select>

  <label>Phone</label>
  <input type="tel" name="phone" required />

  <button class="btn" type="submit">Submit</button>
</form>
  </div>
  <script>
  document.getElementById("employeeForm").addEventListener("submit", function(event) {

      
      event.preventDefault();

      
      const confirmed = confirm("ยืนยันการบันทึกข้อมูลใช่หรือไม่?");

      if (confirmed) {
          
          this.submit();
      }

      
  });
</script>
</body>
</html>
